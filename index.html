<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luyện Đọc Siêu Tốc Mobile</title>
    <style>
        :root {
            --primary: #2196F3;
            --success: #4CAF50;
            --danger: #f44336;
            --bg: #f0f2f5;
        }

        body {
            margin: 0;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        #gameContainer {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
            box-sizing: border-box;
        }

        h1 { color: #ff5722; font-size: 1.5rem; margin: 10px 0; }

        /* Setup Area */
        #setup {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 150px;
            font-size: 18px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        /* Game Area */
        #word {
            font-size: 50px; /* Nhỏ hơn một chút để không bị tràn trên mobile */
            font-weight: bold;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            margin: 20px 0;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            font-size: 20px;
            font-weight: bold;
            padding: 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s;
            touch-action: manipulation;
        }

        button:active { transform: scale(0.95); }

        #startBtn { background: var(--primary); color: white; width: 100%; }
        #correctBtn { background: var(--success); color: white; }
        #wrongBtn { background: var(--danger); color: white; }

        /* Race Track */
        #raceTrack {
            position: relative;
            width: 100%;
            height: 60px;
            background: #444;
            border-radius: 30px;
            margin: 20px 0;
            border: 4px solid #333;
        }

        #car {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 35px;
            transition: left 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }

        #finishLine {
            position: absolute;
            right: 10px;
            top: 0;
            width: 15px;
            height: 100%;
            background: repeating-linear-gradient(0deg, #fff, #fff 10px, #000 10px, #000 20px);
        }

        #summary {
            text-align: left;
            background: white;
            padding: 15px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.6;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="gameContainer">
    <h1>🏁 Luyện Đọc Siêu Tốc 🏁</h1>

    <div id="setup">
        <p>Nhập các từ cần luyện (cách nhau bằng dấu phẩy hoặc xuống dòng):</p>
        <textarea id="wordInput" placeholder="Ví dụ: con mèo, cái bàn, ngôi nhà..."></textarea>
        <button id="startBtn">BẮT ĐẦU CHƠI</button>
        <p id="setupMessage" style="color: red; font-size: 14px;"></p>
    </div>

    <div id="gameArea" class="hidden">
        <div id="word">Đang tải...</div>

        <div class="controls">
            <button id="wrongBtn">THỬ LẠI</button>
            <button id="correctBtn">ĐÚNG</button>
        </div>

        <div id="raceTrack">
            <div id="finishLine"></div>
            <div id="car">🏎️</div>
        </div>

        <div id="summary" class="hidden"></div>
    </div>
</div>

<script>
    let words = [];
    let currentIndex = 0;
    let correctCount = 0;
    let totalAttempts = 0;
    let startTime;
    let wordStartTime;
    let wordStats = [];

    const car = document.getElementById("car");
    const wordDisplay = document.getElementById("word");
    const gameArea = document.getElementById("gameArea");
    const setup = document.getElementById("setup");
    const summary = document.getElementById("summary");

    document.getElementById("startBtn").addEventListener("click", () => {
        const input = document.getElementById("wordInput").value.trim();
        if (!input) {
            document.getElementById("setupMessage").innerText = "Hãy nhập ít nhất vài từ nhé!";
            return;
        }

        words = input.split(/[\n,]+/).map(w => w.trim()).filter(w => w !== "");
        words = words.sort(() => Math.random() - 0.5); // Trộn từ

        setup.classList.add("hidden");
        gameArea.classList.remove("hidden");
        
        startGame();
    });

    function startGame() {
        startTime = Date.now();
        currentIndex = 0;
        correctCount = 0;
        totalAttempts = 0;
        wordStats = [];
        showWord();
    }

    function showWord() {
        if (currentIndex < words.length) {
            wordDisplay.textContent = words[currentIndex];
            wordStartTime = Date.now();
        } else {
            endGame();
        }
    }

    function moveCar() {
        const progress = (correctCount / words.length) * 85; 
        car.style.left = progress + "%";
    }

    document.getElementById("correctBtn").addEventListener("click", () => {
        const timeTaken = ((Date.now() - wordStartTime) / 1000).toFixed(2);
        wordStats.push({ word: words[currentIndex], time: timeTaken, status: "Đúng" });
        
        correctCount++;
        totalAttempts++;
        currentIndex++;
        
        moveCar();
        showWord();
        if (navigator.vibrate) navigator.vibrate(50); // Rung nhẹ khi bấm đúng
    });

    document.getElementById("wrongBtn").addEventListener("click", () => {
        totalAttempts++;
        wordDisplay.style.color = "red";
        setTimeout(() => { wordDisplay.style.color = "#333"; }, 300);
        if (navigator.vibrate) navigator.vibrate([50, 50]); // Rung cảnh báo
    });

    function endGame() {
        const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
        wordDisplay.textContent = "🏆 HOÀN THÀNH!";
        summary.classList.remove("hidden");
        
        let statsHTML = `
            <b>KẾT QUẢ:</b><br>
            ⏱ Tổng thời gian: ${totalTime} giây<br>
            🎯 Tổng lượt bấm: ${totalAttempts}<br>
            📈 Trung bình: ${(totalTime / words.length).toFixed(2)}s/từ<br><br>
            <b>CHI TIẾT:</b><br>
        `;
        
        wordStats.forEach(s => {
            statsHTML += `• ${s.word}: ${s.time}s<br>`;
        });

        summary.innerHTML = statsHTML;
        document.querySelector(".controls").classList.add("hidden");
    }
</script>

</body>
</html>
